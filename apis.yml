aid: apache-zipkin
name: Apache Zipkin
description: >-
  Apache Zipkin is a distributed tracing system that helps gather timing data needed to
  troubleshoot latency problems in service architectures. It manages both the collection
  and lookup of tracing data through a collector and query service. Zipkin provides a REST
  API, web UI, and multiple storage backends (Cassandra, Elasticsearch, MySQL). It supports
  the B3 propagation format and is compatible with OpenZipkin instrumentation libraries.
  Originally created at Twitter, it is now maintained as an open-source project.
type: Index
position: Consumer
access: 3rd-Party
